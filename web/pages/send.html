<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blue岛-发送留言</title>
    <link rel="stylesheet" href="/assets/css/common.css">
</head>
<body>
    <!--头部-->
    <header class="header">
        <div class="logo">
            <img width="100px" src="/assets/images/logo.png" height="100px" alt="logo" onclick="window.location.href='/'"/>
        </div>
        <p>把你的小秘密都藏到岛上来吧！</p>
    </header>

    <main class="container">
        <section class="message-form">
            <form id="messageForm">
                <div class="form-group">
                    <label for="messageContent">留言内容：</label>
                    <textarea id="messageContent" name="content" placeholder="提笔落墨，心事可寄于此..." required></textarea>
                    <div id="wordCount">0/300</div>
                    <div id="contentError" class="error-message"></div>
                </div>

                <div class="form-group">
                    <label for="secretCode">名字/密语：</label>
                    <input type="text" id="secretCode" name="secret_code" placeholder="她（他）的名字或密语">
                    <div id="secretCodeError" class="error-message"></div>
                </div>

                <div class="form-group">
                    <div class="avatar-toggle">
                        <button type="button" class="toggle-btn active" data-type="anonymous">匿名头像</button>
                        <button type="button" class="toggle-btn" data-type="qq">QQ头像</button>
                    </div>

                    <div id="anonymousAvatars">
                        <div class="avatar-options">
                            <img src="/assets/images/avatars/anonymous/anonymous1.jpg" class="avatar-option selected" data-avatar="1">
                            <img src="/assets/images/avatars/anonymous/anonymous2.jpg" class="avatar-option" data-avatar="2">
                            <img src="/assets/images/avatars/anonymous/anonymous3.jpg" class="avatar-option" data-avatar="3">
                            <img src="/assets/images/avatars/anonymous/anonymous4.jpg" class="avatar-option" data-avatar="4">
                            <img src="/assets/images/avatars/anonymous/anonymous5.jpg" class="avatar-option" data-avatar="5">
                        </div>
                        <input type="hidden" id="selectedAvatar" name="avatar" value="1">
                    </div>

                    <div id="qqAvatar" class="qq-avatar-container">
                        <div style="display: flex; align-items: center;">
                            <input type="number" id="qqNumber" name="qq_number" placeholder="输入QQ号获取头像">
                            <button type="button" id="fetchQQAvatar">获取</button>
                        </div>
                        <div class="status-message" id="qqStatus"></div>
                        <img id="qqAvatarPreview" class="qq-avatar-preview" src="" alt="QQ头像预览">
                    </div>
                </div>

                <div class="form-group">
                    <button type="submit" class="submit-btn">提交留言</button>
                    <div class="status-message" id="submitStatus"></div>
                </div>
            </form>
        </section>
        <div class="queryImg">
            <a href="query.html">
                <img src="/assets/images/query.png" alt="查询">
            </a>
        </div>
    </main>

    <footer class="footer">
        <p>&copy2025  @hongjin</p>
    </footer>

    <script src="/assets/js/modules/ui.js"></script>
</body>
</html>
