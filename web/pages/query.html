<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blue岛-查询留言</title>
    <link rel="stylesheet" href="/assets/css/query.css">
</head>
<body>
    <header class="header">
        <div class="logo">
            <img width="100" src="/web/assets/images/logo.png" height="100" alt="logo">
        </div>
        <p>通过暗语查询你的秘密留言</p>
    </header>
    
    <main class="container">
        <div class="search-container">
            <input type="text" class="search-input" placeholder="输入密语...">
            <button class="search-button">🔍</button>
        </div>
        
        <div id="statusMessage" class="status-message"></div>
        
        <section class="message-list-container">
            <div id="illustrationContainer" class="illustration">
                <img src="/web/assets/images/search.png" alt="搜索插画">
                <div class="empty-message">
                    <i class="icon-feather"></i>
                    <p>锦字藏心，待君密语启芳音</p>
                    <p class="subtext">暂未寻得云中锦字</p>
                </div>
            </div>
            <ul class="message-list" id="messageList" style="display:none;"></ul>
        </section>
        <!-- 音乐播放器容器 -->
        <div class="music-player" id="musicPlayer">
            <audio id="bgMusic"></audio>
            
            <!-- 侧边切换按钮 -->
            <div class="player-toggle" id="playerToggle">
                <i class="fas fa-music"></i>
            </div>
            
            <!-- 播放器内容 (默认隐藏) -->
            <div class="player-content">
                <div class="player-controls">
                    <button id="prevBtn" class="control-btn" title="上一首">
                        <i class="fas fa-step-backward"></i>
                    </button>
                    <button id="playPauseBtn" class="control-btn" title="播放/暂停">
                        <i class="fas fa-play"></i>
                    </button>
                    <button id="nextBtn" class="control-btn" title="下一首">
                        <i class="fas fa-step-forward"></i>
                    </button>
                    
                    <div class="song-info">
                        <div id="currentSong">未选择音乐</div>
                        <div class="progress-container">
                            <span id="currentTime">0:00</span>
                            <input type="range" id="progressBar" value="0">
                            <span id="duration">0:00</span>
                        </div>
                    </div>
                    
                    <div class="volume-container" title="音量">
                        <span id="volumeIcon"><i class="fas fa-volume-up"></i></span>
                        <input type="range" id="volumeSlider" min="0" max="1" step="0.1" value="0.7">
                    </div>
                    
                    <button id="playModeBtn" class="control-btn" title="播放模式">
                        <i class="fas fa-redo"></i>
                    </button>
                    <button id="playlistToggle" class="control-btn" title="播放列表">
                        <i class="fas fa-list"></i>
                    </button>
                </div>
                
                <div class="playlist-container">
                    <h3>播放列表 <span id="playlistCount">0/0</span></h3>
                    <ul id="playlist">
                        <!-- 动态生成播放列表 -->
                    </ul>
                </div>
            </div>
        </div>
        <div class="sendImg">
            <a href="send.html">
                <img src="/web/assets/images/write.png" alt="写留言">
            </a>
        </div>
    </main>
    
    <footer class="footer">
        <p>&copy; 2025 @hongjin-晓看天色暮看云，行也思君坐也思君</p>
    </footer>
    
    <script src="/web/assets/js/modules/ui.js" type="module"></script>
    <script src="/web/assets/js/modules/music.js" type="module"></script>
</body>
</html>
