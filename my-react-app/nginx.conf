server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # API 代理到后端（不带尾部斜杠，保留完整路径）
    location /api/ {
        proxy_pass http://blueisland-api:5170;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # 音乐和白噪音代理到后端
    location /assets/music/ {
        proxy_pass http://blueisland-api:5170/assets/music/;
    }

    location /assets/ambient/ {
        proxy_pass http://blueisland-api:5170/assets/ambient/;
    }
}
